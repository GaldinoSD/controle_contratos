{% extends "base.html" %}
{% set page_title = "Alterar Senha" %}
{% block content %}

<!-- ✅ HEADER PREMIUM ALTERAR SENHA -->
<div class="mb-8 animate-premium">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 glass-premium p-8 rounded-[2.5rem] shadow-xl overflow-hidden relative border border-white/20 dark:border-white/5">
        <!-- Decorativos -->
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-amber-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-slate-500/10 rounded-full blur-3xl"></div>

        <div class="flex items-center gap-6 relative z-10">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center text-white shadow-2xl shadow-amber-500/20">
                <i class="fa-solid fa-key text-2xl"></i>
            </div>
            <div>
                <nav class="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">
                    <span>Segurança</span>
                    <i class="fa-solid fa-chevron-right text-[8px] opacity-30"></i>
                    <span class="text-amber-500">Credenciais</span>
                </nav>
                <h2 class="text-3xl font-black text-slate-800 dark:text-white tracking-tight">Redefinição de Senha</h2>
            </div>
        </div>
    </div>
</div>

<div class="max-w-md mx-auto animate-premium">
    <form method="POST" class="card-premium p-10 space-y-8 border border-slate-900/5 dark:border-white/10 shadow-2xl">
        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 block text-center">Digite sua nova senha de acesso</label>
            <div class="relative group">
                <i class="fa-solid fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-amber-500 transition-colors"></i>
                <input type="password" name="nova" required placeholder="••••••••"
                       class="w-full bg-slate-50 dark:bg-white/5 border border-slate-900/10 dark:border-white/10 rounded-2xl px-12 py-5 text-sm font-bold dark:text-white outline-none focus:ring-4 focus:ring-amber-500/10 transition-all">
            </div>
        </div>

        <button type="submit" class="w-full py-5 bg-amber-500 hover:bg-amber-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-amber-500/30 transition-all active:scale-95">
            Atualizar Credenciais
        </button>
        
        <p class="text-[10px] text-center text-slate-400 font-bold uppercase tracking-widest">
            A nova senha terá efeito no próximo login.
        </p>
    </form>
</div>

{% endblock %}
