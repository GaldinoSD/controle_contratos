<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Galdino SD</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    body { font-family: 'Outfit', sans-serif; }

    .bg-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url("{{ url_for('static', filename='img.png') }}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(15, 23, 42, 0.2) 0%, rgba(15, 23, 42, 0.8) 100%);
    }

    .glass-login {
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .animate-login { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @media (max-width: 768px) {
      .bg-container {
        background-image: url("{{ url_for('static', filename='imgmbl.png') }}") !important;
      }
    }
  </style>
</head>

<body class="h-full flex items-center justify-end pr-4 md:pr-48 relative overflow-hidden bg-slate-950">

  <div class="bg-container">
    <div class="bg-overlay"></div>
  </div>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-[320px] md:max-w-[380px] animate-login">
    <div class="glass-login rounded-3xl p-6 md:p-10">
        <!-- Logo Area -->
        <div class="flex flex-col items-center mb-6">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="w-24 h-24 object-contain mb-4 drop-shadow-2xl">
            <h1 class="text-2xl font-bold text-white tracking-tight">Acesso ao Sistema</h1>
        </div>

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Credencial de E-mail</label>
                <div class="relative group">
                    <i class="fa-solid fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-blue-400 transition-colors"></i>
                    <input name="email" type="email" required placeholder="exemplo@email.com"
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-12 py-3.5 text-sm font-medium text-white outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500/30 transition-all placeholder:text-slate-600">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Senha de Acesso</label>
                <div class="relative group">
                    <i class="fa-solid fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-blue-400 transition-colors"></i>
                    <input name="password" type="password" required placeholder="••••••••"
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-12 py-3.5 text-sm font-medium text-white outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500/30 transition-all placeholder:text-slate-600">
                </div>
            </div>

            <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-xs uppercase tracking-[0.2em] shadow-2xl shadow-blue-500/30 transition-all active:scale-95 transform">
                Entrar no Sistema
            </button>
        </form>

        {% with mensagens = get_flashed_messages(with_categories=True) %}
          {% if mensagens %}
            {% for categoria, msg in mensagens %}
              {% if categoria == 'login' %}
                <div class="mt-8 p-4 rounded-2xl bg-red-500/10 border border-red-500/20 flex items-center gap-3">
                    <i class="fa-solid fa-circle-exclamation text-red-500"></i>
                    <p class="text-[10px] font-black text-red-500 uppercase tracking-widest leading-tight">
                      {{ msg }}
                    </p>
                </div>
              {% endif %}
            {% endfor %}
          {% endif %}
        {% endwith %}
        

    </div>
  </div>

</body>
</html>
